Operator":"Viva Energy Refining","Basin":"N/A","First Production":"2028","Type of Gas Processed":"LNG","Capacity (TJ/day)":"750","Gas Field Connections":"N/A","Pipeline Connections":"SWP at Lara injection point","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Viva Energy Australia"]},{"Name":"LNG Regasification Terminal - Outer Harbor LNG Project","Description":"N/A","Status":"Proposed","Location":"Outer Harbor, Adelaide","Ownership":"AG&P","Operator":"AG&P","Basin":"N/A","First Production":"2028","Type of Gas Processed":"Australian and overseas LNG","Capacity (TJ/day)":"405","Gas Field Connections":"N/A","Pipeline Connections":"SEAGas PCA Pelican Point","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["AG&P"]},{"Name":"Notes:","Description":"","Status":"","Location":"","Ownership":"","Operator":"","Basin":"","First Production":"","Type of Gas Processed":"","Capacity (TJ/day)":"","Gas Field Connections":"","Pipeline Connections":"","Expansions":"","Source":"","_companies":[]},{"Name":"A: AEMO has been advised by the project proponent, Squadron Energy, that the latest maximum capacity of this project is up to 520 TJ/d. This was advised after 28 February 2026 so was not included in the 2026 GSOO modelling.","Description":"","Status":"","Location":"","Ownership":"","Operator":"","Basin":"","First Production":"","Type of Gas Processed":"","Capacity (TJ/day)":"","Gas Field Connections":"","Pipeline Connections":"","Expansions":"","Source":"","_companies":[]}]},"Storage":{"headers":["Name","Description","Status","Location","Ownership","Operator","Field","First Storage","Injection Rate into Storage (TJ/day)","Withdrawal Rate from Storage (TJ/day)","Storage Capacity (PJ)","Expansions","Source"],"rows":[{"Name":"Newcastle Gas Storage Facility","Description":"The Newcastle gas storage facility is located at Tomago, 14 km north west of Newcastle. The facility supports peak winter demand in the Sydney-Newcastle area, allows supply of gas into the Sydney STTM, and provides emergency supply during periods of system interruption. The facility incorporates liquefaction, LNG storage and regasification plant, a truck load-out facility and two high-pressure (bi-directional) gas pipelines. These pipelines connect the facility to the Jemena Sydney network in two locations, directly at site and at the Hexham meter station.","Status":"Online","Location":"Tomago NSW","Ownership":"AGL","Operator":"AGL","Field":"LNG Tank","First Storage":"2016","Injection Rate into Storage (TJ/day)":"11","Withdrawal Rate from Storage (TJ/day)":"120","Storage Capacity (PJ)":"1.6","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["AGL"]},{"Name":"Silver Springs Gas Storage","Description":"The Silver Springs gas storage facility is integrated with the Silver Springs plant and located approximately 100 km south of Roma. The facility is wholly-owned and operated by AGL. The facility was commissioned for gas injection in 2011 and utilises the depleted Silver Springs and Renlim gas reservoirs.\nCommenced active operations of injection and withdrawal in May 2016.","Status":"Online","Location":"Surat QLD","Ownership":"OGT Energy","Operator":"OGT Energy","Field":"Bowen Basin","First Storage":"2011","Injection Rate into Storage (TJ/day)":"5 (Reservoir is currently configured only to withdraw)","Withdrawal Rate from Storage (TJ/day)":"10","Storage Capacity (PJ)":"45","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["OGT Energy"]},{"Name":"LNG Storage Dandenong","Description":"The Dandenong LNG facility is located in VIC and owned by\nAPA Group. It serves the market by providing peak gas supply\nto the Victorian Transmission System as well as providing a\ntruck loading station for LNG tankers. The facility stores\nliquefied natural gas at low pressure with a storage capacity\nof 680 TJ. Liquefaction (injection) capacity is 8.2 TJ per day,\nwhile vaporisation (withdrawal) capacity is 87 TJ per day up to\n237 TJ per day (maximum).  \n\nDespite above capacities, APA's contractual obligation for vapourisation capabilities/rates is set out in the \"LNG Storage Facility Agreement\" (and any other \"LNG Storage Agreements\") between Retailers and holders of LNG in the LNG Storage Facility.  In summary, APA whilst capable of injecting at rates up to 180 max contractually only obligated to vaporise LNG up to:\n(1) 100 tonnes per hour; and\n(2) the amount of LNG in the LNG Storage Facility that has been allocated to the Retailer.","Status":"Online","Location":"VIC","Ownership":"APA Group","Operator":"APA Group","Field":"N/A","First Storage":"1980","Injection Rate into Storage (TJ/day)":"8.2","Withdrawal Rate from Storage (TJ/day)":"237","Storage Capacity (PJ)":"0.68","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Iona Underground Gas Storage","Description":"The Iona Gas Storage Facility is located near Port Campbell in south-west VIC.  The facility is operated by Lochard Energy and makes use of the depleted Iona, North Paaratte and Wallaby Creek gas fields to store up to a maximum of 23.5 PJ of gas. Storage capacity is forecast to increase to 24 PJ once Seamer storage field is online.\n\nGas withdrawn from the reservoirs is processed by the Iona Gas Plant and supplied to VIC via the Mortlake and SWP, and to Adelaide via the SEA Gas Pipeline.\n\nTotal storage reservoir injection and withdrawal capacities are up to 155 TJ per day and up to 558 TJ per day, respectively.  These rates are Lochard’s current best estimate at the date of the data submission, based on modelling done to date and operational experience.","Status":"Online","Location":"Port Campbell, Victoria","Ownership":"Australian Retirement Trust (ART) and Queensland Investment Corporation (QIC) QGIF Fund","Operator":"Lochard Energy","Field":"Iona Gas Field, North Paaratte Gas Field, Wallaby Creek Gas & Seamer  Fields","First Storage":"2000","Injection Rate into Storage (TJ/day)":"155","Withdrawal Rate from Storage (TJ/day)":"570","Storage Capacity (PJ)":"Up to a maximum of 24.4 PJ.","Expansions":"Lochard Energy has proposed the Heytesbury Underground Gas Storage Project (HUGS) as an upgrade to the Iona UGS storage facility. (See Heytesbury Underground Gas Storage Project (HUGS))","Source":"Data shown from 2026 GSOO","_companies":["Australian Retirement Trust (ART) and Queensland Investment Corporation (QIC) QGIF Fund"]},{"Name":"Heytesbury Underground Gas Storage Project (HUGS)","Description":"The HUGS Project is focused on the development of the Mylor Flied and associated pipeline extensions and facility upgrades.","Status":"Execute Project Phase","Location":"Port Campbell, Victoria","Ownership":"Australian Retirement Trust (ART) and Queensland Investment Corporation (QIC) QGIF Fund","Operator":"Lochard Energy","Field":"Mylor Gas Field","First Storage":"No Entry","Injection Rate into Storage (TJ/day)":"0","Withdrawal Rate from Storage (TJ/day)":"45","Storage Capacity (PJ)":"1.8 PJ","Expansions":"Second phase of HUGS Project will consider developing additional storage fields that will increase the reservoir injection and storage capacity. The addition of reservoir withdrawal capacity for injection into pipelines will require gas plant augmentations, which is not considered in the concept phase, considering the capacity of SWP.","Source":"Data shown from 2026 GSOO","_companies":["Australian Retirement Trust (ART) and Queensland Investment Corporation (QIC) QGIF Fund"]},{"Name":"Roma Underground Storage","Description":"The RUGS facility is located near Roma where it utilises depleted conventional reservoirs in the Roma area. The facility can receive gas from the Roma field only, and  The facility is owned by Santos Limited.\n\nThe RUGS facility is not used to provide storage capacity into the market.","Status":"Online","Location":"QLD","Ownership":"Santos","Operator":"Santos Limited","Field":"Roma fields","First Storage":"2011","Injection Rate into Storage (TJ/day)":"92","Withdrawal Rate from Storage (TJ/day)":"75","Storage Capacity (PJ)":"54","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Santos"]},{"Name":"Moomba Underground Gas Storage","Description":"The Moomba underground gas storage facility is located approximately 800 km north of Adelaide in SA. The facility is owned and operated by Santos Limited. Depleted reservoirs in the Moomba South field are used to store up to 100 PJ of gas. The facility is currently operating in withdrawal-mode only. \n\nMoomba gas plant is used to process gas withdrawn from storage, there is no separate gas processing facility.","Status":"Online (withdrawal only)","Location":"SA","Ownership":"Santos (66.6 percent), Beach (33.4 percent)","Operator":"Santos Limited","Field":"In South Australia gas is stored in the Moomba field via compression at the Moomba South Central satellite","First Storage":"1980","Injection Rate into Storage (TJ/day)":"100","Withdrawal Rate from Storage (TJ/day)":"10-120","Storage Capacity (PJ)":"70","Expansions":"No expansions currently approved","Source":"Data shown from 2026 GSOO","_companies":["Santos (66.6 percent), Beach (33.4 percent)"]},{"Name":"Golden Beach","Description":"Proposed offshore gas development transitioning to underground gas storage","Status":"Proposed","Location":"Gas Plant 10KM SE of Longford Gas Plant in Victoria. Storage field crest 3 km offshore in Victorian waters, 23 km south and east of the Longford Gas Plant.","Ownership":"GB Energy","Operator":"GB Energy","Field":"Golden Beach Gas Field, Gippsland Basin","First Storage":"2029","Injection Rate into Storage (TJ/day)":"187.5","Withdrawal Rate from Storage (TJ/day)":"375","Storage Capacity (PJ)":"42","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["GB Energy"]},{"Name":"Kurri Kurri Lateral Pipeline","Description":"Bi-directional pipeline and storage facility. The KKLP is a bi-directional pipeline running between  Sydney to Newcastle pipeline (owned by Jemena) at Lenaghan to the Hunter Power Station at Kurri Kurri.","Status":"Online","Location":"NSW","Ownership":"APA Group","Operator":"APA Group","Field":"N/A","First Storage":"2025","Injection Rate into Storage (TJ/day)":"52.8","Withdrawal Rate from Storage (TJ/day)":"60","Storage Capacity (PJ)":"0.072","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]}]},"LNG Export":{"headers":["Name","Acronym","Status","Location","Ownership","Online","Gas Field","Gas Source","Trains","Production Capacity (Mtpa)","Expansions","Source"],"rows":[{"Name":"QGC (Curtis Island)","Acronym":"QCLNG","Status":"Online","Location":"QLD","Ownership":"Shell, CNOOC, MidOcean and Global Infrastructure Partners Australia","Online":"Train 1: 2014\nTrain 2: 2015","Gas Field":"Shell operated Surat Basin PLs","Gas Source":"Coal Seam Gas","Trains":"2 trains","Production Capacity (Mtpa)":"8.5","Expansions":"None","Source":"Data shown from 2026 GSOO","_companies":["Shell, CNOOC, MidOcean and Global Infrastructure Partners Australia"]},{"Name":"Australia Pacific LNG","Acronym":"APLNG","Status":"Online","Location":"QLD","Ownership":"Australia Pacific LNG Pty Ltd through its subsidiaries, Australia Pacific LNG Processing P/L and Australia Pacific LNG (Shared Facilities) P/L","Online":"2016","Gas Field":"Alfredson, Angry Jungle, Anya, Arcadia, Bellevue, Combabula, Condabri, Fairview, Kenya, Kenya East, Murrungama, Peat, Riley, Spring Gully, Talinga Orana, Towrie","Gas Source":"Coal Seam Gas","Trains":"2 trains","Production Capacity (Mtpa)":"9.5","Expansions":"None","Source":"Data shown from 2026 GSOO","_companies":["Australia Pacific LNG Pty Ltd through its subsidiaries, Australia Pacific LNG Processing P/L and Australia Pacific LNG (Shared Facilities) P/L"]},{"Name":"Gladstone LNG","Acronym":"GLNG","Status":"Online","Location":"QLD","Ownership":"Santos, PETRONAS, Total Energies and KOGAS","Online":"2015","Gas Field":"Fairview, Roma, Arcadia Valley, Scotia","Gas Source":"Coal Seam Gas +3rd Party gas from Santos Cooper Basin, Origin portfolio and others","Trains":"2 trains","Production Capacity (Mtpa)":"7.8","Expansions":"None","Source":"Data shown from 2026 GSOO","_companies":["Santos, PETRONAS, Total Energies and KOGAS"]}]},"Field Developments":{"headers":["Name","Description","Status","Location","Ownership","Operator","Basin","First Production","Gas Source","Production Capacity (TJ per day unless otherwise specified)","Production Facility","Market","Pipeline Connection","Expansion Plans","Source"],"rows":[{"Name":"Silver Springs Gas Project","Description":"The Silver Springs gas project is a collection of mature gas fields centred around the Silver Springs plant located approximately 100 km south of Roma. Petroleum products (gas, LPG, condensate and oil) are supplied to Queensland domestic customers. Gas is supplied via a dedicated (bi-directional) pipeline connecting the Silver Springs plant to Wallumbilla via the Wallumbilla LPG Plant.","Status":"Online","Location":"QLD","Ownership":"OGT Energy","Operator":"OGT Energy","Basin":"Surat","First Production":"1984","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"20","Production Facility":"Wallumbilla Gas & Liquid Processing plant","Market":"Queensland domestic & South Australian Generation","Pipeline Connection":"Silver Springs to Wallumbilla pipeline (bi-directional)","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["OGT Energy"]},{"Name":"APLNG Gas Field Development","Description":"The APLNG field development involves the production of coal seam gas from the Surat and Bowen basins in QLD. The APLNG pipeline transports natural gas from the Surat and Bowen basins to the LNG facility, located on Curtis Island, near Gladstone.","Status":"Online","Location":"QLD","Ownership":"APLNG","Operator":"APLNG","Basin":"Surat-Bowen","First Production":"2013-2016","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"1486-1539","Production Facility":"Alfredson, Angry Jungle, Arcadia, Bellevue, Carinya, Combabula, Condabri, Dalwogan, Denison, South Deeps, Denison Trough, Fairview, Ironbark, Kainama, Kenya, Kenya East, Lonesome, Luka, Membrance, Murrungama, Peat, Ramyard, Riley, Spring Gully, Talinga and Orana, Taroom East, and Towrie","Market":"Various","Pipeline Connection":"APLNG pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["APLNG"]},{"Name":"GLNG Field Development","Description":"The Surat basin is a sedimentary basin unconformably overlying the Bowen Basin. The Roma Shelf is a structural feature of the Surat Basin and has a long history of conventional oil and gas exploration dating back to the early 1900’s. More recent petroleum activity has focused on the unconventional (CSG) potential of the region.","Status":"Online","Location":"QLD","Ownership":"Average GLNG partnership: Santos (30%), Total Energies (27.5%), Petronas (27.5%), Kogas (15%)","Operator":"Santos Limited","Basin":"Surat-Bowen","First Production":"1977","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"745 - 1115","Production Facility":"Fairview, Roma, Scotia and Arcadia gas facilities","Market":"LNG export and domestic","Pipeline Connection":"Fairview lateral of the QGP\nComet Ridge to Wallumbilla Pipeline\nGladstone Gas Transmission Pipeline\nScotia APA and APLNG connection","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Average GLNG partnership: Santos (30%), Total Energies (27.5%), Petronas (27.5%), Kogas (15%)"]},{"Name":"Daandine / Stratheden Gas Field","Description":"The gas field is located approximately 40 km west of Dalby. It has been producing coal seam gas since September 2006.","Status":"Existing","Location":"QLD","Ownership":"Arrow","Operator":"Arrow","Basin":"Surat","First Production":"2006","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"76","Production Facility":"Daandine Central Gas Processing Facility","Market":"QLD","Pipeline Connection":"Braemar 1 Pipeline, Braemar 2 Pipeline, Roma Brisbane Pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Arrow"]},{"Name":"Kogan North","Description":"The gas field is located approximately 40 km west of Dalby. It has been producing gas since January 2006.","Status":"Existing","Location":"QLD","Ownership":"Arrow (50%) and CleanCo Queensland Limited (50%)","Operator":"Arrow","Basin":"Surat","First Production":"2006","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"14","Production Facility":"Kogan North Central Gas Processing Facility","Market":"QLD","Pipeline Connection":"Roma Brisbane Pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Arrow (50%) and CleanCo Queensland Limited (50%)"]},{"Name":"Surat Gas Project","Description":"The project involves the staged expansion of coal seam gas production in the Surat Basin which may involve interests held by other parties.\n\nThe environmental impact statement for the project was approved by the State in October 2013 and Commonwealth approval was given in December 2013. An environmental authority for the first phase of the project was issued in 2015. In December 2017 Arrow entered into a gas supply agreement for the majority of its coal seam gas reserves in the Surat Basin. \n\nA final investment decision for the project's first phase (FID1) was made in April 2020, first gas commenced January 2021.\n\nThe first phase of development with construction from 2020, includes more than 600 wells which will bring about 260TJ/day (on an annual basis) of gas to market.","Status":"Online","Location":"QLD","Ownership":"Arrow","Operator":"Arrow","Basin":"Surat","First Production":"2021","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"700\n(The phased nature of the Surat Gas Project means that the approved first phase will produce about 260TJ/day (on an annual basis) of gas for market. Future phases may increase plateau production to approximately 700TJ/d.)","Production Facility":"Daandine Central Gas Processing Facility, Tipton West Central Gas Processing Facility","Market":"QLD","Pipeline Connection":"Braemar 1 Pipeline, Braemar 2 Pipeline, Roma Brisbane Pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Arrow"]},{"Name":"Tipton West Gas Field","Description":"The gas field is located approximately 40 km southwest of Dalby. It has been producing gas since September 2006.","Status":"Existing","Location":"QLD","Ownership":"Arrow","Operator":"Arrow","Basin":"Surat","First Production":"2006","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"37","Production Facility":"Tipton West Central Gas Processing Facility","Market":"QLD","Pipeline Connection":"Braemar 1 Pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Arrow"]},{"Name":"Bowen Gas Project","Description":"The proposed project involves the staged expansion of coal seam gas production in the Bowen Basin which may involve interests held by other parties.\n\nThe environmental impact statement for the project was approved by the State in September 2014 and Commonwealth approval was given in October 2014. An environmental authority for the first phase of the project was issued in 2015.","Status":"Proposed","Location":"QLD","Ownership":"Arrow","Operator":"Arrow","Basin":"Bowen","First Production":"Not Currently Available","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"Not Currently Available","Production Facility":"Not Currently Available","Market":"QLD","Pipeline Connection":"Proposed Arrow Bowen Pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Arrow"]},{"Name":"Moranbah Gas Project","Description":"The MGP is located approximately 1 km from Moranbah. It has been producing coal seam gas since 2004.","Status":"Existing","Location":"QLD","Ownership":"QPM Energy (MGP Upstream) Pty Ltd","Operator":"GR Production Services","Basin":"Bowen","First Production":"2023","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"68","Production Facility":"Moranbah Gas Processing Facility","Market":"QLD","Pipeline Connection":"North Queensland Gas Pipeline","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["QPM Energy (MGP Upstream) Pty Ltd"]},{"Name":"Western Flank Gas","Description":"Western Flank Gas (previously known as  Western Cooper Wet Gas) is located on the western flank of the Cooper Basin in SA. This area includes PRLs 129 and 130, PPLs 239 (Middleton/Brownlow) and 257 (Canunda/Coolawang), covering the majority of the area formerly known as PEL 106, as well as PRL 26 (Udacha), and PRLs 175 to 179 and PPL 212. \nBy end FY18 there is anticipated to  be 12  wells producing in the Western Flank Gas area \nFive exploration/appraisal wells are planned in the remainder of FY18 targeting Patchawarra gas from April to June 2018.\nAn expansion to the production export capacity from 25 MMscfd to 40 MMscfd is expected to be completed within FY18.","Status":"Online","Location":"Cooper Basin","Ownership":"Beach Energy","Operator":"Beach Energy","Basin":"Cooper","First Production":"2012","Gas Source":"Gas condensate","Production Capacity (TJ per day unless otherwise specified)":"19","Production Facility":"Middleton Gas Plant","Market":"Domestic","Pipeline Connection":"Connection to Moomba","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Beach Energy"]},{"Name":"Dingo","Description":"Dingo is located in the Amadeus Basin in the L 7 tenement.  In March 2014, Central acquired discovered but undeveloped gas reserves and the contract to supply PWC at Dingo from Magellan.  Following this acquisition, Central commenced development of the facilities at Dingo, which was completed in April 2015.  This involved the construction of wellhead facilities, gathering pipelines, gas conditioning facilities, a 50km gas pipeline (PL30) to Brewer Estate in Alice Springs, and compression and custody transfer metering facilities.  \n\nThe Dingo wells produce high pressure gas that is transported to Brewer Estate via pipeline.  All hydrocarbon condensates and water and then extracted from the gas and the pressure is reduced to meet customer requirements before sale.","Status":"Production","Location":"NT","Ownership":"50% Central Petroleum (NT) Pty Ltd\n35% Echelon Dingo Pty Ltd\n15% Cue Dingo Pty Ltd","Operator":"Central Petroleum Limited","Basin":"Amadeus","First Production":"2015","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"Commercial in confidence","Production Facility":"Brewer Estate","Market":"NT","Pipeline Connection":"Currently only supplies to PWC for the Owen Springs Power Plant near Alice Springs","Expansion Plans":"Commercial in confidence","Source":"Data shown from 2026 GSOO","_companies":["Central Petroleum (NT) Pty Ltd","Echelon Dingo Pty Ltd","Cue Dingo Pty Ltd"]},{"Name":"Mereenie","Description":"Commercial in confidence","Status":"Production","Location":"NT","Ownership":"42.5% Echelon Mereenie Pty Ltd (ACN 650 386 360)\n25% Central Petroleum Mereenie Pty Ltd (ACN 605 831 025) as trustee for the Central Petroleum Mereenie Unit Trust (ABN 92 760 840 674)\n25% Horizon Australia Energy Pty Ltd (ACN 673 423 295)\n7.5% Cue Mereenie Pty Ltd (ACN 650 385 336)","Operator":"Central Petroleum Limited","Basin":"Amadeus","First Production":"1984","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"Commercial in confidence","Production Facility":"Mereenie Oil and Gas Field Production Facility.","Market":"NT and  NGP into the East Coast","Pipeline Connection":"AGP","Expansion Plans":"Commercial in confidence","Source":"Data shown from 2026 GSOO","_companies":["Echelon Mereenie Pty Ltd","Central Petroleum Mereenie Pty Ltd","Horizon Australia Energy Pty Ltd","Cue Mereenie Pty Ltd"]},{"Name":"Palm Valley","Description":"The Palm Valley gas field was brought back online in late 2018, producing approximately 6TJ/d from 3 wells. The Palm Valley 13 (\"PV13) well was drilled in 2018 and brought online in May 2019. With the addition of this well, Palm Valley is now capable of producing 13TJ/d sales gas with processing capacity up to 15TJ/d.","Status":"Production","Location":"NT","Ownership":"50% Central Petroleum (NT) Pty Ltd (ACN 009 718 183)\n35% Echelon Palm Valley Pty Ltd (ACN 650 386 397)\n15% Cue Palm Valley Pty Ltd (ACN 650 385 541)","Operator":"Central Petroleum Limited","Basin":"Amadeus","First Production":"1987","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"Commercial in confidence","Production Facility":"Palm Valley gas field production facility","Market":"NT and  NGP into the East Coast","Pipeline Connection":"AGP","Expansion Plans":"Commercial in confidence","Source":"Data shown from 2026 GSOO","_companies":["Central Petroleum (NT) Pty Ltd","Echelon Palm Valley Pty Ltd","Cue Palm Valley Pty Ltd"]},{"Name":"Gunn Project Area and Albany Conventional Structure – ATPs 743P, 744P and 1015P (Galilee Basin) Queensland","Description":"Comet's Galilee Basin acreage contains both shallow coal seam gas (CSG) and deeper conventional / sandstone resources.\n\nVintage Energy own 30% of the sandstone acreage.                                                                                                                                                            No field activity undertaken over the last 54 months. The Galilee ATPs have been renewed for a 12-year term and six new Potential Commercial Areas (PCAs) awarded for 15 years over the most prospective areas of the permits, retaining a large area.","Status":"Galilee tenure  cancelled by QLD Govt","Location":"Central QLD","Ownership":"Comet Ridge Galilee Pty Ltd (ATP 744, ATP 743 & ATP 1015) - (Conventional & CSG Shallows) \nVintage Energy Limited (Conventional)","Operator":"Comet Ridge Galilee Pty Ltd","Basin":"Galilee","First Production":"Unknown at this time. More appraisal work is required for both the conventional and CSG assets.","Gas Source":"Coal Seam Gas\nSandstone Reservoir Gas","Production Capacity (TJ per day unless otherwise specified)":"Not yet designed","Production Facility":"Not yet designed","Market":"N/A","Pipeline Connection":"None","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Comet Ridge Galilee Pty Ltd (ATP 744, ATP 743 & ATP 1015) - (Conventional & CSG Shallows)","Vintage Energy Limited (Conventional)"]},{"Name":"Mahalo East CSG Project (ATP 2061) Queensland","Description":"The Mahalo East (ATP 2061) project is located in the Denison Trough in the Bowen Basin in central Queensland.\n\nIt abuts part of PL 1082 (part of the Mahalo project) which is directly south and in which Comet Ridge is a 57.14% owner. \n\nThe prospective coals in PL 1082 extend into ATP 2061 which should allow for a reasonably early development. \n\nWith the available coal bore geological data over the area and given the proximity to existing geological data in PL 1082, Sproule Incorporated were engaged to provide an independent resource estimate in December 2022. A booking of 8.4PJ (1C), 31PJ (2C) and 122PJ (3C) was announced.\n\nComet drilled a vertical core hole and a dual lateral well (intersecting the lateral well) in late 2024. The well was successfully production tested during the first 5 months of 2025. This program booked a sizeable area of 2P reserve of 51.8PJ (2P) and 118.5 PJ (3P), independently certified by Sproule Incorporated.","Status":"Not approved for Development","Location":"Central QLD","Ownership":"15% Cue Palm Valley Pty Ltd (ACN 650 385 541)","Operator":"Comet Ridge Mahalo East P/L","Basin":"Bowen","First Production":"Unknown","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"Not yet designed","Production Facility":"Not yet designed","Market":"The east coast domestic market only","Pipeline Connection":"Either to Jemena's QGP or GLNG's GTP, or to both. Option also exists to potentially tie into Denison Gas's 6\" pipeline at Arcturus.","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Cue Palm Valley Pty Ltd"]},{"Name":"Mahalo FarEast CSG Proj (Field) Queensland","Description":"The Mahalo Far East project is located in the Denison Trough in the Bowen Basin in central Queensland.\n\nIt touches a corner of ATP 2061 (Mahalo East) to the south west. \n\nThe prospective coals in PL 1082 and ATP 2061 are expected to continue up into the south western part of the Mahalo Far East permit area. The area is relatively unexplored from a CSG perspective and will therefore need both seismic and core hole exploration activity to progress.                                                                                  There is some potential for conventional (sandstone) gas targets within the permit area but exploration (in the form of seismic initially) will be required to better assess the prospectivity of any conventional opportunities.\nThe permit was formally awarded to Comet Ridge as ATP 2063 in May 2021.  Detailed desk top geological analysis is continuing and a well is being considered in the south west corner of the block but no firm time frame currently exists for a well to be drilled.\n                                                                                                              In addition, Comet Ridge was granted Authority to Prospect (ATP) 2072 over tender block PLR2023-1-1, and covers an area of 66 km2 and is located immediately north of Mahalo East and west of Mahalo Far East. This area is called \"Mahalo Far East Extension''.","Status":"No entry","Location":"Central QLD","Ownership":"Comet Ridge Mahalo Far East P/L","Operator":"Comet Ridge Mahalo Far East P/L","Basin":"Bowen","First Production":"Unknown","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"Not yet designed","Production Facility":"Not yet designed","Market":"ATP 2063 - The east coast domestic market only                                                                                          ATP 2072 - No domestic market only condition","Pipeline Connection":"To Jemena's QGP (Via Mahalo Gas Pipeline). Option also exists to potentially tie into Denison Gas's 6\" pipeline at Arcturus.","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Comet Ridge Mahalo Far East P/L"]},{"Name":"Mahalo North CSG Project (ATP 2048) Queensland","Description":"The Mahalo North project is located in the Denison Trough in the Bowen Basin in central Queensland.\n\nIt abuts the Mahalo Project (PL 1083 and PL 1082) in which Comet Ridge is a 57.14% equity holder (see cell to the left). \n\nThe prospective coals in PL 1083 and PL 1082 extend into ATP 2048 which should allow for a rapid early development. Work was undertaken in respect to environmental studies to underpin a Petroleum Lease (PL) application which was submitted in October 2023. This PLA has been given the designation of PLA 1128 by Qld DoR. A subsequent petroleum lease application was submitted in April 2024 and has been given the designation PLA 1132. Comet Ridge plans to develop approximately 10 TJ/d and move that either 14km to the west to an available pipeline or south via a pipeline that will be developed in conjunction with the Mahalo project. \n\nComet drilled a vertical core hole and a dual lateral well (intersecting the lateral well) in late 2021. The well was production tested during the first 8 months of 2022. This program booked a sizeable area of 2P reserve of 43PJ (2P) and 110 PJ (3P), independently certified by Sproule Incorporated.\nIn December 2023, an upgraded estimate of 3P Reserves was independently certified by Sproule Incorporated. This resulted in an increase of 39 PJ in the 3P area only.","Status":"Not approved for Development","Location":"Central QLD","Ownership":"Comet Ridge Mahalo North P/L","Operator":"Comet Ridge Mahalo North P/L","Basin":"Bowen","First Production":"FID is currently unknown due to continued delays with EPBC approval which was originally submitted in October 2023.","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"Not yet designed","Production Facility":"Not yet designed","Market":"The east coast domestic market only","Pipeline Connection":"Either to Jemena's QGP or GLNG's GTP, or to both. Option also exists to potentially tie into Denison Gas's 6\" pipeline at Arcturus.","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Comet Ridge Mahalo North P/L"]},{"Name":"Casino Gas Project","Description":"The Casino Gas Project is located in the Otway Basin off the south coast of Victoria, approximately 29 km from Port Campbell. The Casino gas field was brought online in January 2006, with the Henry and Netherby wells brought online in 2010.","Status":"Online","Location":"Otway Basin","Ownership":"Amplitude Energy Ltd. 50%, O.G. Energy 50%","Operator":"Amplitude Energy Ltd.","Basin":"Otway","First Production":"2006","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"32","Production Facility":"Athena Gas Plant","Market":"Domestic","Pipeline Connection":"PCI/PCA","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Amplitude Energy Ltd. 50%, O.G. Energy 50%"]},{"Name":"Otway Gas Project","Description":"Multiple gas fields that feed into the Otway Gas Plant","Status":"Online","Location":"Otway Basin","Ownership":"Beach Energy  60%                  OGOG 40%","Operator":"Beach Energy","Basin":"Otway","First Production":"2007","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"205","Production Facility":"Otway Gas Plant","Market":"Domestic","Pipeline Connection":"PCI/PCA, SWP","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Beach Energy  60%                  OGOG 40%"]},{"Name":"Sole and Manta Gas Project","Description":"The Sole Project is located in the Gippsland Basin off the south coast of Victoria. Sole gas began processing through the Orbost Gas Plant in December 2020","Status":"Sole – online; Manta – proposed","Location":"Gippsland Basin","Ownership":"Amplitude Energy Ltd.","Operator":"Amplitude Energy Ltd.","Basin":"Gippsland","First Production":"2019","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"68","Production Facility":"Orbost plant","Market":"Domestic","Pipeline Connection":"EGP","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Amplitude Energy Ltd."]},{"Name":"Annie","Description":"Tie-back to Casino Henry Netherby off-shore production system","Status":"Potential development","Location":"Otway Basin","Ownership":"Amplitude Energy Ltd. 50%,O.G. Energy 50%","Operator":"Amplitude Energy Ltd.","Basin":"Otway","First Production":"2028","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"N/A","Production Facility":"Likely Athena Gas Plant","Market":"Domestic","Pipeline Connection":"N/A","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Amplitude Energy Ltd. 50%,O.G. Energy 50%"]},{"Name":"Kipper","Description":"Kipper production is currently from two subsea wells with facilities tied back to GBJV (Gippsland Basin Joint Venture) -owned West Tuna  platform (WTN). Existing subsea facilities include two sub-sea trees (additional planned), four flowbases, four coolers and production manifold. Looped KPA350 North/South production pipelines to WTN (allowing for round trip pigging) are owned by GBJV. Two GBJV-owned umbilicals from WTN supply fluids and electrics to subsea facilities. \nKipper Receiving Facilities are located on WTN and comprise two Gas Scraper Launcher / Receivers, Two-Phase Separator and Metering. HPU & MCS \ninterface control to subsea facilities. Per the Field Development Plan, future activities include additional drilling as part of the Stage 1B project (in progress as at Sep 2025). Note: The Kipper Unit JV is responsible for all facilities upstream of the  receipt point (inlet flange of the subsea manifold).","Status":"Online","Location":"Offshore near Ninety Mile Beach, Victoria","Ownership":"Mitsui 35 %                         Esso Australia (Exxon Mobil subsidiary) 32.5 %                      BHP Billiton 32.5 %","Operator":"Esso Australia (Exxon Mobil subsidiary)","Basin":"Gippsland","First Production":"2017","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"N/A","Production Facility":"Longford","Market":"East Coast Market","Pipeline Connection":"Longford gas plant","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Mitsui 35 %                         Esso Australia (Exxon Mobil subsidiary) 32.5 %                      BHP Billiton 32.5 %"]},{"Name":"Tuna","Description":"The Tuna development is located in the coastal waters of Bass Strait, in offshore south-east VIC. The project will produce conventional gas from the Gippsland basin and is part of the Gippsland Basin Joint Venture, comprising Exxon Mobil subsidiary Esso Australia and Woodside. It has been developed in conjunction with the Kipper and Turrum fields, which when combined, is one of the largest domestic gas developments on the eastern seaboard. The Tuna reservoir, which has been producing oil since 1979, has been further developed to produce additional gas and associated liquids. This has been done by converting existing West Tuna facilities, and also using new pipelines to deliver production into the existing gas system.","Status":"Online","Location":"Coastal waters of Bass Strait, offshore south-east Victoria.","Ownership":"Esso / Woodside","Operator":"Esso Australia Resources Pty Ltd","Basin":"Gippsland","First Production":"2013","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"N/A","Production Facility":"Longford","Market":"East Coast Market","Pipeline Connection":"Longford gas plant","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Esso / Woodside"]},{"Name":"Turrum","Description":"The Turrum development is located in the coastal waters of Bass Strait, in offshore south-east VIC. The project produces conventional gas and oil from the Gippsland Basin and is part of the Gippsland Basin Joint Venture, comprising ExxonMobil subsidiary Esso Australia and Woodside. Development of the Turrum field was sanctioned in July 2008, with first gas production in 2017. Turrum was developed in conjunction with the Tuna and Kipper fields, which when combined, is one of the largest domestic gas developments on the eastern seaboard.","Status":"Online","Location":"Coastal waters of Bass Strait, offshore south-east Victoria.","Ownership":"Esso / Woodside","Operator":"Esso Australia Resources Pty Ltd","Basin":"Gippsland","First Production":"2016","Gas Source":"Conventional","Production Capacity (TJ per day unless otherwise specified)":"N/A","Production Facility":"Longford","Market":"East Coast Gas Market","Pipeline Connection":"Longford gas plant","Expansion Plans":"Turrum Phase 3","Source":"Data shown from 2026 GSOO","_companies":["Esso / Woodside"]},{"Name":"Surat Bowen Basin","Description":"The Surat basin is a sedimentary basin unconformably overlying the Bowen Basin. The Roma Shelf is a structural feature of the Surat Basin and has a long history of conventional oil and gas exploration dating back to the early 1900’s. More recent petroleum activity has focused on the unconventional (CSG) potential of the region. \n\nThe primary CSG target in the Surat Basin are coal seams contained within the Middle Jurassic Walloon Subgroup which consists of numerous coal seams present over a large interval (typically 150-250m).","Status":"Exploration, Appraisal and Development","Location":"Queensland","Ownership":"Average GLNG partnership: Santos 30%                      Total Energies 27.5%, Petronas 27.5%             Kogas 15%","Operator":"Santos","Basin":"Surat/Bowen","First Production":"Refer to Roma, Fairview, Scotia, and Arcadia Hubs","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"700","Production Facility":"Fairview, Scotia, Roma, Arcadia Hubs","Market":"Domestic, Export (LNG facilities)","Pipeline Connection":"To Jemena's QGP and GLNG's GTP","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Average GLNG partnership: Santos 30%                      Total Energies 27.5%, Petronas 27.5%             Kogas 15%"]},{"Name":"Mahalo Gas (CSG) Project (PL 1082 & 1083) Queensland","Description":"The Mahalo project is located in the Denison Trough in the Bowen Basin in central Queensland.\n\nIt is one of the larger undeveloped gas projects in eastern Australia with gross 2P reserves of 266 PJ across the block based on the Sproule Revisions to Reserves and Contingent Resources booking of 2P reserves of 152PJ dated 31 July 2021 (COI share grossed up).  \n\nPetroleum Leases PL 1082 and PL 1083 across the northern part of the Mahalo Gas Project were approved by the Queensland government in June 2020. With this, the Mahalo Asset needs to progress to FID.\n\nThe project is geographically very close to market with the southern end of the block only 35km north west of Jemena's QGP and GLNG's GTP high capacity pipelines.                                                               On 3 August 2021 Comet Ridge announced that it was acquiring the 30% equity of APLNG's share of the Mahalo Gas project. This took Comet Ridge equity initially to 70% in the project and completed on 28 June 2022.  Santos exercised an option on 23 September 2022 to buy part of this equity (12.86%) from Comet Ridge which reduced Comet Ridge equity down to 57.14%.","Status":"Not approved for Development","Location":"Central QLD","Ownership":"Comet Ridge Mahalo Pty Ltd  57.14%                                                                                                                                                                                                                          Santos QNT Pty Ltd  42.86%","Operator":"Santos QNT Pty Ltd","Basin":"Bowen","First Production":"FID has not been reached. The current schedule anticipates FID in May 2026.","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"50 TJ/day from this block and planning for two other blocks to the north to be included in development to push the ultimate total plant rate higher than this.","Production Facility":"Currently in FEED","Market":"The east coast domestic and export markets","Pipeline Connection":"Either to Jemena’s QGP or GLNG’s GTP, or to both","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Comet Ridge Mahalo Pty Ltd  57.14%                                                                                                                                                                                                                          Santos QNT Pty Ltd  42.86%"]},{"Name":"Cooper","Description":"The Cooper Basin borders of north east South Australia across the south west of Queensland and spans about 127,000 square kilometres.\n\nThere are over 100 fields in the Cooper-Eromanga basin and gas production that flow to Moomba Gas Plant. Gas sales to Adelaide commenced in 1969 (via the MAP), and to Sydney (via the MSP) in 1976.","Status":"Online","Location":"SA/QLD","Ownership":"Santos 66.6 %\nBeach 33.4 %","Operator":"Santos Limited","Basin":"Eromanga","First Production":"1963","Gas Source":"Conventional and Unconventional","Production Capacity (TJ per day unless otherwise specified)":"Refer to Moomba Gas Plant","Production Facility":"Moomba Gas Production Facility.","Market":"Eastern Australia Gas Market and Export","Pipeline Connection":"Pipelines into the Moomba Plant:\nDella to Moomba\nBig Lake to Moomba\nGidgealpa to Moomba\nTirrawarra to Moomba\nBallera to Moomba\nPipelines out of the Moomba Plant:\nMAP, MSP, SWQP and liquids export line to Port Bonython","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Santos 66.6 %","Beach 33.4 %"]},{"Name":"Narrabri CSG","Description":"The Narrabri CSG project is located in the Gunnedah Basin in north central NSW.  \n\nThe field produces small volumes of coal seam gas, which is used for electricity generation at the local Wilga Park power station.","Status":"Producing","Location":"North-west slopes and plains, NSW","Ownership":"Santos","Operator":"Santos Limited","Basin":"Gunnedah","First Production":"2009","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"5","Production Facility":"New facilities / facility expansion.","Market":"Domestic","Pipeline Connection":"Wilga Park Power Station, further connections under consideration","Expansion Plans":"Significant expansion planned","Source":"Data shown from 2026 GSOO","_companies":["Santos"]},{"Name":"Western Surat Gas Project","Description":"The Western Surat Gas Project (the Project) involves the extraction of natural gas from coal seams over approximately 915 square kilometres of Senex permits\n\nArea previously referred to as WSGP has been renamed Roma North to reflect combined project nature of acreage","Status":"Online","Location":"Surat Basin, north east of Roma, Queensland","Ownership":"Senex Energy Ltd","Operator":"Senex Energy","Basin":"Surat Basin","First Production":"2019","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"40","Production Facility":"Senex designed, constructed, commissioned and operated the gas processing facility, prior to selling it to Jemena in September 2019. Initial capacity of 16 TJ/d, expanded to 24 TJ/d with a maximum design capacity of 48 TJ/day. Senex put a long-term Gas Processing and Transportation Agreement in place with Jemena, and pays a tariff.","Market":"Not provided.","Pipeline Connection":"The gas processing facility is tied into the Comet Ridge to Wallumbilla Pipeline.","Expansion Plans":"Ongoing exploration and appraisal activity will be undertaken in the broader WSGP and Don Juan acreage with the drilling of 5 wells","Source":"Data shown from 2026 GSOO","_companies":["Senex Energy Ltd"]},{"Name":"Project Atlas","Description":"Project Atlas is 58 km2 of development-ready coal seam gas acreage located south-west of Wandoan in Queensland’s Surat Basin. We expect to drill around 100 wells over the life of the project. All gas from the project will be sold to the domestic market. The acreage is capable of sustaining plateau production of >30TJ/day.\nProject Altas is expected to expand by the addition of ATP2059 adding 18km2 and 47PJ additional 2P reserves to the project.","Status":"Online","Location":"20 km south-west of Wandoan in Queensland's Surat Basin","Ownership":"Senex Energy Ltd","Operator":"Senex Energy","Basin":"Surat Basin","First Production":"2019","Gas Source":"Coal Seam Gas","Production Capacity (TJ per day unless otherwise specified)":"48","Production Facility":"Jemena CPF","Market":"Domestic","Pipeline Connection":"The Atlas gas processing facility is connected via the Atlas export pipeline to the Darling Downs Pipeline, to enable Atlas gas to be transported to the Wallumbilla hub for sale to domestic customers.","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Senex Energy Ltd"]},{"Name":"QGC Surat Development","Description":"The QGC Surat Development involves the phased // ---- State ----
let selectedCompany = null;
let activeTab = 'overview';
let statusFilter = 'all';

const TABS = [
  { id: 'overview', label: 'Overview', sheet: null },
  { id: 'Pipelines', label: 'Pipelines', sheet: 'Pipelines' },
  { id: 'Processing', label: 'Processing', sheet: 'Processing' },
  { id: 'Storage', label: 'Storage', sheet: 'Storage' },
  { id: 'LNG Export', label: 'LNG Export', sheet: 'LNG Export' },
  { id: 'Field Developments', label: 'Field Developments', sheet: 'Field Developments' },
  { id: 'Pipeline Transmission Tariffs', label: 'Tariffs', sheet: 'Pipeline Transmission Tariffs' },
  { id: 'Reserves and Resources', label: 'Reserves & Costs', sheet: null },
];

const FACILITY_TABS = ['Pipelines', 'Processing', 'Storage', 'LNG Export', 'Field Developments'];

// Build company→asset index
const companyIndex = {};
FACILITY_TABS.forEach(sheetName => {
  const sheet = RAW.sheets[sheetName];
  if (!sheet) return;
  sheet.rows.forEach(row => {
    (row._companies || []).forEach(c => {
      if (!companyIndex[c]) companyIndex[c] = {};
      if (!companyIndex[c][sheetName]) companyIndex[c][sheetName] = 0;
      companyIndex[c][sheetName]++;
    });
  });
});

const allCompanies = RAW.companies;

// ---- Init ----
function init() {
  renderCompanyList(allCompanies);
  document.getElementById('all-count').textContent = allCompanies.length;
  renderTabs();
  renderContent();
}

// ---- Company List ----
function renderCompanyList(companies) {
  const el = document.getElementById('companyListEl');
  el.innerHTML = companies.map(c => {
    const counts = companyIndex[c] || {};
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    return `<div class="company-item ${selectedCompany === c ? 'active' : ''}" onclick="selectCompany('${c.replace(/'/g, "\'")}')">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px" title="${c}">${c}</span>
      <span class="count">${total}</span>
    </div>`;
  }).join('');
}

function filterCompanies() {
  const q = document.getElementById('companySearch').value.toLowerCase();
  const filtered = allCompanies.filter(c => c.toLowerCase().includes(q));
  renderCompanyList(filtered);
}

function selectCompany(company) {
  selectedCompany = company;
  statusFilter = 'all';
  document.getElementById('all-btn').className = 'all-btn' + (company === null ? ' active' : '');
  activeTab = 'overview';
  renderCompanyList(allCompanies.filter(c => {
    const q = document.getElementById('companySearch').value.toLowerCase();
    return c.toLowerCase().includes(q);
  }));
  renderTabs();
  renderContent();
}

// ---- Tabs ----
function getFilteredRows(sheetName) {
  const sheet = RAW.sheets[sheetName];
  if (!sheet) return [];
  if (!selectedCompany) return sheet.rows;
  return sheet.rows.filter(row => (row._companies || []).includes(selectedCompany));
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map(tab => {
    let count = '';
    if (tab.sheet && FACILITY_TABS.includes(tab.sheet)) {
      const rows = getFilteredRows(tab.sheet);
      count = `<span class="tab-count">${rows.length}</span>`;
    }
    return `<div class="tab ${activeTab === tab.id ? 'active' : ''}" onclick="setTab('${tab.id}')">
      ${tab.label}${count}
    </div>`;
  }).join('');
}

function setTab(id) {
  activeTab = id;
  statusFilter = 'all';
  renderTabs();
  renderContent();
}

// ---- Content ----
function renderContent() {
  const el = document.getElementById('content');
  if (activeTab === 'overview') {
    el.innerHTML = renderOverview();
  } else if (activeTab === 'Reserves and Resources') {
    el.innerHTML = renderReserves();
  } else if (activeTab === 'Pipeline Transmission Tariffs') {
    el.innerHTML = renderTariffs();
  } else {
    el.innerHTML = renderFacilitySheet(activeTab);
  }
}

function statusClass(s) {
  if (!s) return 'status-other';
  const l = s.toLowerCase();
  if (l.includes('online') || l.includes('operating')) return 'status-online';
  if (l.includes('proposed')) return 'status-proposed';
  if (l.includes('committed') || l.includes('under construction')) return 'status-committed';
  if (l.includes('decommission') || l.includes('closed')) return 'status-decommissioned';
  return 'status-other';
}

function renderOverview() {
  if (selectedCompany) {
    const counts = companyIndex[selectedCompany] || {};
    const initials = selectedCompany.split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
    const statsHtml = FACILITY_TABS.map(t => {
      const n = counts[t] || 0;
      return `<div class="stat-card">
        <div class="label">${t}</div>
        <div class="value">${n}</div>
        <div class="sub">asset${n !== 1 ? 's' : ''}</div>
      </div>`;
    }).join('');

    // Asset list
    let assetsHtml = '';
    FACILITY_TABS.forEach(sheetName => {
      const rows = getFilteredRows(sheetName);
      if (rows.length === 0) return;
      const rowsHtml = rows.map(r => {
        const sc = statusClass(r.Status);
        return `<tr>
          <td class="name">${r.Name || r.Pipeline || '-'}</td>
          <td><span class="status-badge ${sc}">${r.Status || '-'}</span></td>
          <td>${r.Location || '-'}</td>
          <td class="desc">${(r.Description || '').substring(0, 100)}${(r.Description || '').length > 100 ? '…' : ''}</td>
        </tr>`;
      }).join('');
      assetsHtml += `<div class="table-wrap" style="margin-bottom:16px">
        <div class="tw-header"><h3>${sheetName}</h3><span>${rows.length} record${rows.length !== 1 ? 's' : ''}</span></div>
        <table><thead><tr><th>Name</th><th>Status</th><th>Location</th><th>Description</th></tr></thead>
        <tbody>${rowsHtml}</tbody></table>
      </div>`;
    });

    return `<div class="company-banner">
      <div class="company-avatar">${initials}</div>
      <div>
        <h2>${selectedCompany}</h2>
        <p>Gas market participant – 2026 AEMO GSOO data</p>
      </div>
    </div>
    <div class="overview-grid">${statsHtml}</div>
    ${assetsHtml || '<div class="empty-state"><p>No facility records found for this company.</p></div>'}`;
  }

  // All companies overview
  const totals = {};
  FACILITY_TABS.forEach(t => { totals[t] = (RAW.sheets[t] || {rows:[]}).rows.length; });

  const statsHtml = FACILITY_TABS.map(t => `<div class="stat-card">
    <div class="label">${t}</div>
    <div class="value">${totals[t]}</div>
    <div class="sub">records</div>
  </div>`).join('');

  const compHtml = `<div class="stat-card">
    <div class="label">Companies</div>
    <div class="value">${allCompanies.length}</div>
    <div class="sub">participants</div>
  </div>`;

  // Top companies by asset count
  const ranked = allCompanies.map(c => {
    const n = Object.values(companyIndex[c] || {}).reduce((a, b) => a + b, 0);
    return { c, n };
  }).sort((a, b) => b.n - a.n).slice(0, 15);

  const rankRows = ranked.map(({c, n}) => `<tr onclick="selectCompany('${c.replace(/'/g, "\'")}')">
    <td class="name" style="cursor:pointer;color:var(--accent)">${c}</td>
    <td>${n}</td>
    ${FACILITY_TABS.map(t => `<td>${(companyIndex[c] || {})[t] || ''}</td>`).join('')}
  </tr>`).join('');

  return `<div class="overview-grid">${compHtml}${statsHtml}</div>
  <div class="table-wrap">
    <div class="tw-header"><h3>Top Companies by Asset Count</h3><span>Click to filter</span></div>
    <table>
      <thead><tr><th>Company</th><th>Total</th>${FACILITY_TABS.map(t => `<th>${t}</th>`).join('')}</tr></thead>
      <tbody>${rankRows}</tbody>
    </table>
  </div>`;
}

function renderFacilitySheet(sheetName) {
  const sheet = RAW.sheets[sheetName];
  if (!sheet) return '<div class="empty-state">No data.</div>';
  let rows = getFilteredRows(sheetName);

  // Status filter bar
  const statuses = [...new Set(sheet.rows.map(r => r.Status).filter(Boolean))].sort();
  const filterBar = `<div class="filter-bar">
    <span class="filter-chip ${statusFilter === 'all' ? 'active' : ''}" onclick="setStatusFilter('all')">All (${rows.length})</span>
    ${statuses.map(s => {
      const n = rows.filter(r => r.Status === s).length;
      return `<span class="filter-chip ${statusFilter === s ? 'active' : ''}" onclick="setStatusFilter('${s}')">${s} (${n})</span>`;
    }).join('')}
  </div>`;

  if (statusFilter !== 'all') rows = rows.filter(r => r.Status === statusFilter);

  if (rows.length === 0) return filterBar + '<div class="no-results">No records match the selected filters.</div>';

  // Choose key columns to show
  const keyColMap = {
    'Pipelines': ['Name','Status','Location','Ownership','Operator','First Gas Flow','Start Node','End Node','Length (km)','Maximum Capacity (TJ per day)','Regulations','Expansion Plans'],
    'Processing': ['Name','Status','Location','Ownership','Operator','Basin','First Production','Type of Gas Processed','Capacity (TJ/day)','Gas Field Connections','Pipeline Connections','Expansions'],
    'Storage': ['Name','Status','Location','Ownership','Operator','Field','First Storage','Storage Capacity (PJ)','Injection Rate into Storage (TJ/day)','Withdrawal Rate from Storage (TJ/day)','Expansions'],
    'LNG Export': ['Name','Acronym','Status','Location','Ownership','Online','Gas Source','Gas Field','Trains','Production Capacity (Mtpa)','Expansions'],
    'Field Developments': ['Name','Status','Location','Ownership','Operator','Basin','First Production','Gas Source','Production Capacity (TJ per day unless otherwise specified)','Production Facility','Market','Pipeline Connection','Expansion Plans'],
  };

  const showCols = (keyColMap[sheetName] || sheet.headers).filter(h => sheet.headers.includes(h));

  const thead = showCols.map(h => `<th>${h}</th>`).join('');
  const tbody = rows.map(r => {
    const cells = showCols.map(h => {
      let v = r[h] || '';
      if (h === 'Status') return `<td><span class="status-badge ${statusClass(v)}">${v || '-'}</span></td>`;
      if (h === 'Name') return `<td class="name">${v || '-'}</td>`;
      if (h === 'Description') return `<td class="desc">${v.substring(0, 120)}${v.length > 120 ? '…' : ''}</td>`;
      if (h === 'Ownership') return `<td class="ownership tip" data-tip="${v.replace(/"/g, '&quot;')}">${v.substring(0, 60)}${v.length > 60 ? '…' : ''}</td>`;
      if (h === 'Expansion Plans' || h === 'Expansions') return `<td class="desc">${v.substring(0, 100)}${v.length > 100 ? '…' : ''}</td>`;
      if (h === 'Gas Field Connections' || h === 'Pipeline Connections' || h === 'Pipeline Connection') return `<td class="desc" style="font-size:11px">${v.substring(0, 100)}${v.length > 100 ? '…' : ''}</td>`;
      if (['Length (km)','Maximum Capacity (TJ per day)','Capacity (TJ/day)','Storage Capacity (PJ)','Injection Rate into Storage (TJ/day)','Withdrawal Rate from Storage (TJ/day)','Production Capacity (Mtpa)','Production Capacity (TJ per day unless otherwise specified)','Trains'].includes(h)) return `<td style="text-align:right;font-weight:600;color:var(--accent2)">${v || '–'}</td>`;
      return `<td>${v || '-'}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  return `${filterBar}<div class="table-wrap">
    <div class="tw-header">
      <h3>${sheetName}</h3>
      <span>${rows.length} record${rows.length !== 1 ? 's' : ''}${selectedCompany ? ' for ' + selectedCompany : ''}</span>
    </div>
    <div style="overflow-x:auto"><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>
  </div>`;
}

function setStatusFilter(f) {
  statusFilter = f;
  renderContent();
}

function renderTariffs() {
  const sheet = RAW.sheets['Pipeline Transmission Tariffs'];
  if (!sheet) return '<div class="empty-state">No data.</div>';
  const years = sheet.headers.filter(h => /^\d{4}$/.test(h));
  const thead = ['Pipeline', 'Direction', ...years].map(h => `<th>${h}</th>`).join('');
  const tbody = sheet.rows.map(r => {
    const cells = ['Pipeline', 'Direction', ...years].map((h, i) => {
      if (i === 0) return `<td class="name">${r[h] || '-'}</td>`;
      const v = r[h];
      return `<td style="text-align:right">${v ? '$' + parseFloat(v).toFixed(4) : '-'}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  return `<div class="table-wrap tariff-table">
    <div class="tw-header"><h3>Pipeline Transmission Tariffs ($/GJ)</h3><span>${sheet.rows.length} pipelines · 2026–2045</span></div>
    <div style="overflow-x:auto"><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>
  </div>
  <p style="font-size:12px;color:var(--text3);margin-top:8px">Tariffs are indicative values used in 2026 GSOO modelling. Extracted 15 December 2025.</p>`;
}

function renderReserves() {
  const res = RAW.sheets['Reserves and Resources'];
  const costs = RAW.sheets['Production Costs'];

  const resRows = (res?.rows || []).map(r =>
    `<tr><td class="name">${r.Basin}</td><td style="text-align:right">${parseFloat(r['2P (PJ)'] || 0).toLocaleString('en-AU', {maximumFractionDigits: 1})}</td><td style="text-align:right">${parseFloat(r['2C (PJ)'] || 0).toLocaleString('en-AU', {maximumFractionDigits: 1})}</td></tr>`
  ).join('');

  const costRows = (costs?.rows || []).map(r =>
    `<tr><td class="name">${r.Basin}</td><td style="text-align:right">${r['2P ($/GJ)'] !== '-' ? '$' + r['2P ($/GJ)'] : '–'}</td><td style="text-align:right">${r['2C ($/GJ)'] !== '-' ? '$' + r['2C ($/GJ)'] : '–'}</td></tr>`
  ).join('');

  return `<div class="reserves-grid">
    <div class="table-wrap">
      <div class="tw-header"><h3>Reserves &amp; Resources</h3><span>PJ · as at Feb 2026</span></div>
      <table><thead><tr><th>Basin</th><th style="text-align:right">2P (PJ)</th><th style="text-align:right">2C (PJ)</th></tr></thead><tbody>${resRows}</tbody></table>
    </div>
    <div class="table-wrap">
      <div class="tw-header"><h3>Production Costs</h3><span>$/GJ · Source: Rystad Energy</span></div>
      <table><thead><tr><th>Basin</th><th style="text-align:right">2P ($/GJ)</th><th style="text-align:right">2C ($/GJ)</th></tr></thead><tbody>${costRows}</tbody></table>
    </div>
  </div>
  <p style="font-size:12px;color:var(--text3)">Production costs are to the point of injection. 2P = Proved + Probable Reserves. 2C = Best Estimate Contingent Resources.</p>`;
}

init();
</script>
</body>
</html>
