<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 AEMO GSOO – Gas Supply Data Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --sidebar: 280px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 56px; flex-shrink: 0; }
  header .logo { display: flex; align-items: center; gap: 10px; }
  header .logo svg { width: 28px; height: 28px; }
  header h1 { font-size: 16px; font-weight: 700; color: var(--text); }
  header .subtitle { font-size: 12px; color: var(--text2); margin-left: 4px; }
  header .badge { margin-left: auto; background: var(--accent); color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  aside { width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; }
  .search-box { position: relative; }
  .search-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px 7px 30px; font-size: 13px; color: var(--text); outline: none; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 14px; height: 14px; }
  .company-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .company-list::-webkit-scrollbar { width: 4px; }
  .company-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .company-item { padding: 7px 16px; cursor: pointer; font-size: 13px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; border-left: 2px solid transparent; }
  .company-item:hover { background: var(--surface2); color: var(--text); }
  .company-item.active { background: rgba(59,130,246,0.1); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
  .company-item .count { font-size: 10px; background: var(--surface2); padding: 1px 6px; border-radius: 10px; color: var(--text3); }
  .company-item.active .count { background: rgba(59,130,246,0.2); color: var(--accent); }
  .all-btn { padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); border-left: 2px solid transparent; transition: background 0.1s; }
  .all-btn:hover { background: var(--surface2); }
  .all-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,0.08); }

  /* Main */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Tabs */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; gap: 2px; flex-shrink: 0; overflow-x: auto; }
  .tabs::-webkit-scrollbar { height: 3px; }
  .tab { padding: 14px 16px; font-size: 13px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; white-space: nowrap; font-weight: 500; transition: color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .tab-count { font-size: 10px; background: var(--surface2); padding: 1px 6px; border-radius: 10px; margin-left: 6px; color: var(--text3); }
  .tab.active .tab-count { background: rgba(59,130,246,0.2); color: var(--accent); }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 20px; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  /* Overview cards */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .stat-card .label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-card .value { font-size: 26px; font-weight: 700; color: var(--text); margin: 4px 0 2px; }
  .stat-card .sub { font-size: 11px; color: var(--text2); }

  /* Company header */
  .company-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
  .company-avatar { width: 42px; height: 42px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }
  .company-banner h2 { font-size: 18px; font-weight: 700; }
  .company-banner p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .table-wrap .tw-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-wrap .tw-header h3 { font-size: 13px; font-weight: 600; }
  .table-wrap .tw-header span { font-size: 11px; color: var(--text3); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 14px; font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }
  td.name { font-weight: 600; color: var(--text); }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .status-online { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-proposed { background: rgba(245,158,11,0.15); color: var(--orange); }
  .status-committed { background: rgba(59,130,246,0.15); color: var(--accent); }
  .status-decommissioned { background: rgba(239,68,68,0.15); color: var(--red); }
  .status-other { background: rgba(148,163,184,0.1); color: var(--text3); }
  td.desc { max-width: 280px; font-size: 12px; line-height: 1.5; color: var(--text3); }
  td.ownership { max-width: 200px; font-size: 12px; color: var(--text3); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state svg { width: 40px; height: 40px; margin: 0 auto 12px; display: block; opacity: 0.4; }
  .no-results { padding: 30px 16px; text-align: center; color: var(--text3); font-size: 13px; }

  /* Tariff table special */
  .tariff-table td { font-size: 12px; font-family: monospace; }

  /* Reserves table */
  .reserves-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 700px) { .reserves-grid { grid-template-columns: 1fr; } }

  /* Tooltip */
  .tip { position: relative; cursor: help; }
  .tip:hover::after { content: attr(data-tip); position: absolute; left: 0; top: calc(100% + 4px); background: #1e293b; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text2); white-space: pre-wrap; max-width: 300px; z-index: 10; line-height: 1.5; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-chip { padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--accent); }
</style>
</head>

<div class="layout">

<script>
const RAW = {"sheets":{"Pipelines":{"headers":["Name","Description","Status","Location","Ownership","Operator","First Gas Flow","Start Node","End Node","Length (km)","Maximum Capacity (TJ per day)","Regulations","Compression","Expansion Plans","Source"],"rows":[{"Name":"Braemar Gas Pipeline","Description":"Alinta Energy owns approximately 150km of gas pipeline in Queensland between Tipton, Condamine and Braemar, which is used for the supply of gas to Alinta Energy's Braemar Power Station (a fast start, peaking power station dispatching into the NEM). The pipeline is bi-directional allowing for gas to flow from the pipeline onto the Roma to Brisbane Pipeline at the Condamine connection point.","Status":"Online","Location":"QLD","Ownership":"Alinta Energy","Operator":"Alinta Energy","First Gas Flow":"2005","Start Node":"Condamine, Tipton","End Node":"Braemar","Length (km)":"150","Maximum Capacity (TJ per day)":"80","Regulations":"Not regulated","Compression":"MAOP 9.6MPa","Expansion Plans":"No committed expansion plans at this stage.","Source":"Data shown from 2026 GSOO","_companies":["Alinta Energy"]},{"Name":"Berwyndale Wallumbilla Pipeline (“BWP”)","Description":"The BWP is a bi-directional pipeline that supplies gas between Berwyndale, east of Miles, Queensland, and the Wallumbilla Gas Hub. The pipeline allows shippers to deliver gas to south-eastern Australia markets via its connection to the South West Queensland Pipeline at the Wallumbilla Hub.","Status":"Online","Location":"QLD","Ownership":"APA Group","Operator":"APA Group","First Gas Flow":"2009","Start Node":"8km east of Miles, Qld.","End Node":"Wallumbilla Gas Hub","Length (km)":"112","Maximum Capacity (TJ per day)":"164 west\n276 east","Regulations":"Not covered","Compression":"Nil","Expansion Plans":"Increased compression on BWP Westernhaul to accommodate additional flows up to 330TJ/d from current 164TJ/d nameplate capacity.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Carpentaria Gas Pipeline (“CGP”)","Description":"The CGP is a bi-directional that links Ballera in South-West QLD and Mt Isa in North-West QLD. The pipeline transports gas to mines in the Carpentaria Mt Isa minerals province and power stations at Mica Creek and Mt Isa. The pipeline is owned and operated by APA Group. In 2018 the Northern Gas Pipeline was connected to the CGP just outside of Mt Isa, and allows the transportation of gas from the NT into the CGP which provides access to APA's East Coast Grid. In 2024 the connection to the NT system was augmented for reverse flow enabling gas to flow from the CGP to the NT system via the NGP.","Status":"Online","Location":"QLD","Ownership":"APA Group","Operator":"APA Group","First Gas Flow":"1998","Start Node":"Ballera","End Node":"Mt Isa","Length (km)":"840","Maximum Capacity (TJ per day)":"119 North                                                  65 South","Regulations":"Light","Compression":"Compressor stations at Davenport Downs (1 unit) and Morney Tank (1 unit).","Expansion Plans":"No expansions of capacity (north or south) are currently planned.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Moomba to Sydney Pipeline System (“MSP”)","Description":"The MSP is a bi-directional pipeline system that links Moomba in north-east SA with Wilton and Culcairn Bomen in NSW. The pipeline is owned and operated by APA Group. The MSP and its laterals supply gas to Queensland (via a connection to SWQP), South Australia (via a connection to MAPS), Victoria (via a connection to NVI), Sydney (via a connection to JGN), Canberra and rural NSW.","Status":"Online","Location":"SA / QLD / NSW","Ownership":"APA Group","Operator":"APA Group","First Gas Flow":"1976","Start Node":"Moomba","End Node":"Wilton","Length (km)":"Mainline: 1300            Laterals: 642","Maximum Capacity (TJ per day)":"565 South\n195 North","Regulations":"Part of the MSP system (Marsden to Young and Young to Wagga Wagga) is covered by Light Access Regulation.","Compression":"Compressor stations at Bulla Park (2 units), Marsden (1 unit) and Young (4 units)","Expansion Plans":"APA has committed to a multi-stage expansion of the MSP.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Victorian Northern Interconnect (“VNI”)","Description":"The VNI is a bi-directional pipeline that links the Moomba Sydney Pipeline system with the Victorian Transmission System. The pipeline runs between Bomen, near Wagga Wagga in NSW, and Barnawartha, near Wodonga in Victoria. The pipeline was commissioned in 1998 and is owned,  operated and maintained by APA Group. The section between Culcairn and Barnawartha is operated by AEMO.","Status":"Online","Location":"VIC/NSW","Ownership":"APA Group","Operator":"APA Group - Bomen to Culcairn section                               AEMO - Culcairn to Barnawartha section","First Gas Flow":"1998","Start Node":"Bomen","End Node":"Barnawartha","Length (km)":"88 km – Bomen to Culcairn section; 62.5 km – Culcairn to Barnawartha","Maximum Capacity (TJ per day)":"195 South\n223 North","Regulations":"Bomen to Culcairn section – Not Covered                             Culcairn to Barnawartha section - Covered","Compression":"Compressor stations at Wollert (5 units), Springhurst (1 unit), Euroa (1 unit) and Culcairn (3 units).","Expansion Plans":"There are currently no expansion plans.\nWhen required by the market, additional compression at\nYoung and Uranquinty could provide an additional 120TJ/d of capacity (south) with an expected construction lead time of between 18 and 24 months. Further expansion options are available including duplicating the pipeline, and these options can be investigated with interested customers.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Roma - Brisbane Pipeline (“RBP”)","Description":"The RBP is a bi-directional pipeline that links Wallumbilla in south-east QLD and Brisbane. The pipeline is owned and operated by APA Group and is a scheme pipeline under the access regime of the National Gas Law and National Gas Rules.\nThe RBP transports Surat Basin gas to Brisbane and to southern states via the Wallumbilla Hub.","Status":"Online","Location":"QLD","Ownership":"APA Group","Operator":"APA Group","First Gas Flow":"1969","Start Node":"Wallumbilla","End Node":"Brisbane","Length (km)":"438","Maximum Capacity (TJ per day)":"167 East\n125 West","Regulations":"Covered","Compression":"Compressor stations at Kogan, Oakey and Dalby","Expansion Plans":"There are currently no expansion plans.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"South West Pipeline (“SWP”)","Description":"The SWP links Iona and Brooklyn and forms part of the Victorian Transmission System. The pipeline connects the Iona underground storage facility with the Brooklyn Corio Pipeline. SWP is owned and maintained by APA Group, and operated by AEMO. \nThe VTS is subject to full regulation by the AER.","Status":"Online","Location":"VIC","Ownership":"APA Group","Operator":"AEMO","First Gas Flow":"1999","Start Node":"Iona","End Node":"Brooklyn","Length (km)":"202","Maximum Capacity (TJ per day)":"500 East\n340 West","Regulations":"Covered","Compression":"There is compression at Winchelsea.","Expansion Plans":"Compression and looping expansion from Iona to Brooklyn (forward) that could increase capacity up to 615 TJ/day.","Source":"Data shown from 2026 VGPR Update","_companies":["APA Group"]},{"Name":"South West Queensland Pipeline (“SWQP”)","Description":"The SWQP is a bi-directional and fully looped pipeline that links Wallumbilla in south-east QLD and Moomba in north-east SA. The SWQP allows Bowen-Surat basin producers to supply gas to southern markets via the MSP and MAPS, and Queensland markets via connections to multiple pipelines at the Wallumbilla Hub.","Status":"Online","Location":"QLD/SA","Ownership":"APA Group","Operator":"APA Group","First Gas Flow":"1996","Start Node":"Wallumbilla","End Node":"Moomba","Length (km)":"937","Maximum Capacity (TJ per day)":"365 East\n512 West","Regulations":"Not Covered","Compression":"Compressor stations at Cooladdi (2 units), Moomba (3 units) and Wallumbilla (9 units).","Expansion Plans":"APA has committed to a multi-stage expansion of the SWQP.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Wallumbilla Gladstone Pipeline (“WGP”)","Description":"The WGP transports gas from Surat and Bowen basin fields around Miles and Wandoan in QLD to the QCLNG export facility on Curtis Island, off the coast of Gladstone.","Status":"Online","Location":"QLD","Ownership":"APA Group","Operator":"QGC","First Gas Flow":"2014","Start Node":"QCLNG Surat and Bowen Basin fields","End Node":"Gladstone","Length (km)":"543","Maximum Capacity (TJ per day)":"1588","Regulations":"Not regulated","Compression":"N/A","Expansion Plans":"There are currently no expansion plans.","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Longford to Melbourne Gas Pipeline (“LMP”)","Description":"The LMP is part of the Victorian Transmission System (VTS) / Declared Transmission System (DTS) and runs from outside Sale in South-East Victoria, to Dandenong, near Melbourne. The pipeline is owned and maintained by APA Group and operated by AEMO.","Status":"Online","Location":"VIC","Ownership":"APA Group","Operator":"AEMO","First Gas Flow":"1970","Start Node":"Longford","End Node":"Melbourne","Length (km)":"174","Maximum Capacity (TJ per day)":"1114 forward\n304 reverse","Regulations":"Covered","Compression":"There is compression at Gooding.","Expansion Plans":"No plans.","Source":"Data shown from 2026 VGPR Update","_companies":["APA Group"]},{"Name":"South East Australia Gas (“SEA Gas”) Mortlake Pipeline","Description":"The Mortlake pipeline begins at Iona and ends at the Mortlake Power station. \n\nIt is 83km in length and 500mm in diameter.\n\nThere is currently no compression installed on the Mortlake pipeline.","Status":"Online","Location":"VIC","Ownership":"APA Group (50 percent), Retail Employees Superannuation Trust (50 percent)","Operator":"SEA Gas","First Gas Flow":"2011","Start Node":"Port Campbell","End Node":"Mortlake power station.","Length (km)":"83","Maximum Capacity (TJ per day)":"150 forward\n50 reverse","Regulations":"Not Covered","Compression":"Nil","Expansion Plans":"No plans","Source":"Data shown from 2026 GSOO","_companies":["APA Group (50 percent), Retail Employees Superannuation Trust (50 percent)"]},{"Name":"South East Australia Gas (“SEA Gas”) Port Campbell – Adelaide (“PCA”) Pipeline","Description":"The PCA pipeline begins at Port Campbell in VIC and ends at Pelican Point in Adelaide, SA. \n\nIt is approximately 689km in length, of which approximately half consists of twin 350mm diameter pipelines and the remainder is 450mm in diameter.\n\nThere are two mid-line compressors, one at Miakite in Victoria and the other at Coomandook in South Australia.","Status":"Online","Location":"SA / VIC","Ownership":"APA Group (50 percent), Retail Employees Superannuation Trust (50 percent)","Operator":"SEA Gas","First Gas Flow":"2004","Start Node":"Port Campbell","End Node":"Adelaide","Length (km)":"689","Maximum Capacity (TJ per day)":"250","Regulations":"Not Covered","Compression":"There are currently two compressor stations at approximately the ¼ and ¾ point of SEA Gas’ Port Campbell to Adelaide pipeline. The compressor stations became operational in February 2004 and January 2005 respectively. Each compressor station consists of a 4.5MW Solar Centaur compressor driven by a gas turbine which utilises gas from the pipeline as fuel.","Expansion Plans":"No plans.","Source":"Data shown from 2026 GSOO","_companies":["APA Group (50 percent), Retail Employees Superannuation Trust (50 percent)"]},{"Name":"APLNG Pipeline","Description":"APLNG's high pressure pipelines begins at the APLNG Surat and Bowen basin fields and connects at Wandoan from where a single pipe connects to APLNG's LNG facility on Curtis Island.  APLNG also owns other high pressure pipelines and laterals. Collectively, APLNG Pipelines.","Status":"Online","Location":"QLD","Ownership":"APLNG","Operator":"Origin Energy as upstream operator of APLNG","First Gas Flow":"2013","Start Node":"APLNG Surat and Bowen basin fields","End Node":"Curtis Island","Length (km)":"365","Maximum Capacity (TJ per day)":"1630","Regulations":"All APLNG's pipelines have part 23 exception. A section of APLNGs high pressure pipeline is covered by the 15 year green field no covered exception.","Compression":"NIL","Expansion Plans":"No expansion plans at present.","Source":"Data shown from 2026 GSOO","_companies":["APLNG"]},{"Name":"Braemar 2 Pipeline","Description":"The pipeline is a high-pressure buried steel pipeline to transport coal seam gas from the Daandine Central Gas Processing Facility to the Braemar 2 Power Station. It is approximately 107 Km in length.","Status":"Online","Location":"QLD","Ownership":"Arrow","Operator":"Energy Infrastructure Management Pty Ltd","First Gas Flow":"2009","Start Node":"Daandine Central Gas Processing Facility","End Node":"Braemar 2 Power Station","Length (km)":"107","Maximum Capacity (TJ per day)":"219","Regulations":"Non Scheme Pipeline","Compression":"The Braemar 2 Pipeline has no dedicated inline or boost compression.","Expansion Plans":"None Currently Planned","Source":"Data shown from 2026 GSOO","_companies":["Arrow"]},{"Name":"Moomba to Adelaide Pipeline System (“MAPS”)","Description":"The Moomba to Adelaide Pipeline (MAPS) was developed by the Pipelines Authority of South Australia (a Government owned utility) and commenced operation on 28 November 1969, delivering gas from Moomba, in the Cooper Basin, for use in South Australian power generation, industrial and domestic applications.\n\nThe MAPS is now owned and operated by Epic Energy South Australia who are owned by Q-Super. \n\nThe MAPS supplies gas to regional centres as well as to Adelaide. A pipeline lateral running from the mainline supplies Port Pirie and Whyalla which has a maximum capacity of 24 TJ per day. An additional lateral to Angaston delivers gas to industrial users and into the APGA-owned Riverland Pipeline that, in turn, supplies gas users in Berri, Murray Bridge and Mildura at a capacity of 22 TJ per day.\n\nIn addition to delivering gas from the Cooper Basin into the South Australian market, the MAPS can receive gas from southeast Queensland through the APA-owned 'QSN Link' and from Victoria through the SEA Gas pipeline.\n\nThe nameplate capacity of the complete Moomba to Adelaide Pipeline System is 249 TJ per day.\n\nThe MAPS provides a critical role supporting the non dispatchable intermittent renewable energy in SA via providing dispatchable, firm gas transport to fast start, low emission gas fired generation.","Status":"Online","Location":"SA","Ownership":"Epic Energy South Australia","Operator":"Epic Energy South Australia","First Gas Flow":"1969","Start Node":"Moomba","End Node":"Adelaide","Length (km)":"1117","Maximum Capacity (TJ per day)":"249 South\n85 North","Regulations":"Not Covered","Compression":"The MAPS has 8 mainline compressors (at 4 stations) and 2 lateral inlet compressors (Angaston lateral and Port Pirie lateral).","Expansion Plans":"None planned","Source":"Data shown from 2026 GSOO","_companies":["Epic Energy South Australia"]},{"Name":"Comet Ridge to Wallumbilla Pipeline (\"CRWP\")","Description":"The Comet Ridge to Wallumbilla Pipeline (CRWP) is a transmission pipeline owned and operated by GLNG Operations Pty Limited (GLNG) which is a joint venture between Santos, Petronas, Total and Korea Gas Corporation.\n\nThe CRWP was constructed in 2007 and is 127km in length. It links the Fairview gas plant at Comet Ridge with the Wallumbilla gas hub near Roma in Queensland. It is also connected to GLNG's Roma Underground Gas Storage Facility via the Roma Compressor Station. The CRWP is capable of bi-directional operation. The CRWP can transport gas in a southerly direction from GLNG's Fairview, Arcadia and Comet Ridge coal seam gas fields in the Bowen-Surat basin to the domestic market and the Roma Underground Gas Storage Facility. However, after GLNG's LNG export facility commenced operation in the second half of 2015, the CRWP has generally transported gas in a northerly direction to GLNG's gas transmission pipeline for transport to its LNG facility at Gladstone. \n\nThe CRWP is a non-scheme pipeline under the NGL and is subject to regulation under the NGR. \n\nThe CRWP Loop was constructed in 2014 under the same licence and easement as the CRWP and is designed to take third party sourced gas to combine with GLNG produced gas to flow to the GLNG LNG export facility.","Status":"Complete and operational","Location":"QLD","Ownership":"GLNG","Operator":"GLNG","First Gas Flow":"2007","Start Node":"GLNG Surat and Bowen Basin fields","End Node":"Wallumbilla","Length (km)":"CRWP 127km\nCRWP loop 120km","Maximum Capacity (TJ per day)":"950 North\n175 South","Regulations":"Not Covered","Compression":"Not provided.","Expansion Plans":"NA","Source":"Data shown from 2026 GSOO","_companies":["GLNG"]},{"Name":"GLNG Pipeline","Description":"The GLNG pipeline begins at Fairview and ends at Gladstone. It was constructed to transport gas from Fairview to GLNG's LNG export facility in Gladstone.","Status":"Complete and operational","Location":"QLD","Ownership":"GLNG","Operator":"GLNG","First Gas Flow":"2014","Start Node":"GLNG Surat and Bowen Basin fields","End Node":"Gladstone","Length (km)":"420","Maximum Capacity (TJ per day)":"1430","Regulations":"Not covered and has a no coverage exemption","Compression":"Compression is provided by GLNG Field Hubs and from Wallumbilla.","Expansion Plans":"","Source":"Data shown from 2026 GSOO","_companies":["GLNG"]},{"Name":"Atlas Gas Pipeline","Description":"The 60 km pipeline from the Jemena owned Atlas Gas Processing Facility to the Atlas-DDP interconnection  on the PPL134 section of the DDP.","Status":"Online","Location":"QLD","Ownership":"Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)","Operator":"Jemena","First Gas Flow":"2019","Start Node":"Atlas Gas Processing Facility","End Node":"Atlas-DDP connection point","Length (km)":"60","Maximum Capacity (TJ per day)":"Commercial in confidence","Regulations":"Not Covered","Compression":"Start of line compression","Expansion Plans":"Commercial in confidence","Source":"Data shown from 2026 GSOO","_companies":["Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)"]},{"Name":"Darling Downs Pipeline (“DDP”)","Description":"The 292 km interconnected bi-directional pipeline provide gas to Darling Downs Power Station, \nAPLNG's export pipeline and also links to \nthe Wallumbilla Gas Hub","Status":"Online","Location":"QLD","Ownership":"Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)","Operator":"Jemena Ltd","First Gas Flow":"2009","Start Node":"APLNG Surat and Bowen basin fields","End Node":"Wallumbilla Gas Hub\nDarling Downs Power Station\nAPLNG Pipeline","Length (km)":"292","Maximum Capacity (TJ per day)":"DDP90 Southern 155 TJ/d\nDDP133 Western 502 TJ/d\nDDP133 Eastern 160 TJ/d\nDDP134 Western 365 TJ/d\nDDP134 Eastern 268 TJ/d","Regulations":"Not covered","Compression":"Nil","Expansion Plans":"Refer to Jemena Website: https://www.jemena.com.au/siteassets/asset-folder/documents/pipeline/ddp/ddp-tariffs---1-jan-2024.pdf","Source":"Data shown from 2026 GSOO","_companies":["Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)"]},{"Name":"Eastern Gas Pipeline (“EGP”)","Description":"The EGP begins at Longford in VIC and ends at Sydney in NSW. The pipeline was commissioned in 2000 and is owned and operated by Jemena. The 797 km EGP transports gas primarily from Gippsland Basin fields at Longford and Orbost in VIC, to markets in the ACT, Sydney, and regional centres along its route. Jemena EGP includes an important interconnection lateral near Wilton in NSW which will facilitate deliveries on to the MSP. The pipeline also interconnects with Jemena’s VicHub facility, which enables gas to flow between the EGP and the VTS.","Status":"Online","Location":"VIC / NSW","Ownership":"Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)","Operator":"Jemena Ltd","First Gas Flow":"2000","Start Node":"Longford","End Node":"Sydney","Length (km)":"797","Maximum Capacity (TJ per day)":"Capacity - From Victoria to NSW\n350 (Summer)\n362 (Winter)","Regulations":"Not Covered","Compression":"Seven compressors.","Expansion Plans":"To facilitate the transport of gas associated with the proposed import terminal at Port Kembla, it is proposed that the EGP will be modified, with minimal cost, to allow the transport of gas both in a northerly and southerly direction (to Vic). With such minor modifications, the EGP will be capable of receipting more than the 520TJ/d of gas that could be injected as proposed by AIE.","Source":"Data shown from 2026 GSOO","_companies":["Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)"]},{"Name":"Northern Gas Pipeline (“NGP”)","Description":"The 622km Northern Gas Pipeline links Tennant Creek in the Territory to Mount Isa in Queensland, unlocking the next phase of economic growth for the Territory and help build a stronger Northern Australia.","Status":"Online","Location":"NT / QLD","Ownership":"Jemena Northern Gas Pipeline Pty Ltd","Operator":"Jemena","First Gas Flow":"2019","Start Node":"Tennant Creek","End Node":"Mt Isa","Length (km)":"622","Maximum Capacity (TJ per day)":"106","Regulations":"Not Covered","Compression":"The NGP has start and end of line compressors.","Expansion Plans":"The NGP can be expanded by adding mid-line compression and looping.","Source":"Data shown from 2026 GSOO","_companies":["Jemena Northern Gas Pipeline Pty Ltd"]},{"Name":"Queensland Gas Pipeline (“QGP”)","Description":"The Queensland Gas pipeline links the Wallumbilla Gas hub in central Qld to large industrial gas users in Gladstone and Rockhampton","Status":"Online","Location":"QLD","Ownership":"Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)","Operator":"Jemena","First Gas Flow":"1990","Start Node":"Wallumbilla","End Node":"Gladstone","Length (km)":"627","Maximum Capacity (TJ per day)":"145 TJ/d North\n37.2 TJ/d South","Regulations":"Not Covered","Compression":"The QGP has two inline compressor stations. One at Rolleston and another at Banana.","Expansion Plans":"NA","Source":"Data shown from 2026 GSOO","_companies":["Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)"]},{"Name":"North Queensland Gas Pipeline (“NQGP”)","Description":"The NQGP begins at Moranbah in QLD and ends at Townsville in QLD. The pipeline is wholly owned by the North Queensland Pipeline No. 1 and 2 and operated by Energy Infrastructure Management Pty Ltd. First gas flow along the 392 km pipeline began in 2004 to provide CSG from the Moranbah gas fields in the Bowen Basin to Townsville’s Yabulu 220 MW combined cycle power station, and industrial customers in the Townsville area. Capacity is estimated at 110 TJ per day. The NQGP is a stand-alone pipeline that is not connected to any other pipelines in south east Australia gas network and is currently unregulated.","Status":"Online","Location":"QLD","Ownership":"North Queensland Pipeline No. 2","Operator":"NQGP / Worley Power Services","First Gas Flow":"2003","Start Node":"Moranbah","End Node":"Townsville","Length (km)":"370","Maximum Capacity (TJ per day)":"108                                 20 (maximum flow from storage to DNM delivery point)","Regulations":"Not Regulated.","Compression":"None","Expansion Plans":"NA","Source":"Data shown from 2026 GSOO","_companies":["North Queensland Pipeline No. 2"]},{"Name":"Tasmanian Gas Pipeline (“TGP”)","Description":"The Tasmanian Gas Pipeline (TGP) is a subsea and onshore pipeline of approximately 740km in length, which starts at the Longford Compressor Station (Victoria) and finishes in Hobart and Port Latta (NW) Tasmania.\nThe subsea section is approximately 300km in length, 14” internal diameter and has a maximum allowable operating pressure of 15.3MPa.\nOnshore is an 8” pipeline that runs from Bell Bay (Tamar Valley Power Station) to Hobart, and a 6” pipeline that runs from Rosevale to Port Latta. The onshore pipeline south of Bell Bay has a maximum allowable operating pressure of 10.2MPa.\nTasHub, connects the TGP into the Longford to Melbourne pipeline and facilitates a flow of up to 120TJ/day into the VTS from gas stored on TGP.\nStored gas is up to a maximum of 150TJ/Day","Status":"Online","Location":"VIC / TAS","Ownership":"Tasmanian Gas Pipeline Pty Ltd (TGPPL)","Operator":"Tasmanian Gas Pipeline Pty Ltd","First Gas Flow":"2002","Start Node":"Longford","End Node":"Hobart","Length (km)":"740","Maximum Capacity (TJ per day)":"129","Regulations":"Not Covered","Compression":"TGP does not own or operate any compressors","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Tasmanian Gas Pipeline Pty Ltd (TGPPL)"]},{"Name":"Hunter Gas Pipeline","Description":"A new build high pressure gas pipeline to connect Santos’ proposed Narrabri Gas Project with the east coast domestic gas market at Newcastle (Hexham)","Status":"Proposed","Location":"NSW","Ownership":"Santos","Operator":"Santos","First Gas Flow":"Not available at this stage","Start Node":"Narrabri Gas Plant","End Node":"Hexham","Length (km)":"413","Maximum Capacity (TJ per day)":"TBD but planning for up to 200 TJ/d","Regulations":"N/A","Compression":"Nil","Expansion Plans":"Reverse flow not under consideration","Source":"Data shown from 2026 GSOO","_companies":["Santos"]},{"Name":"Arrow Bowen Pipeline","Description":"The pipeline is a proposed high-pressure buried steel pipeline to transport coal seam gas from Arrow's proposed Bowen Gas Project in the Bowen Basin to Gladstone. The environmental impact statement for the pipeline was approved by the State in March 2013 and Commonwealth approval was given in October 2014.  A petroleum pipeline licence and environmental authority were issued by the State respectively, in November 2016 and April 2017. Please refer also to Cell AA17 in Table S3A of Producer file.","Status":"Proposed","Location":"QLD","Ownership":"Arrow","Operator":"Not available at this state","First Gas Flow":"Not available at this stage","Start Node":"Arrow’s proposed Bowen Gas Project","End Node":"Gladstone","Length (km)":"430","Maximum Capacity (TJ per day)":"Not available at this stage","Regulations":"Not available at this stage","Compression":"Not available at this stage","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Arrow"]},{"Name":"Amadeus Gas Pipeline","Description":"The bi-directional Amadeus Gas Pipeline (AGP) is a transmission pipeline that extends from the Amadeus Basin in the south of the Northern Territory to Darwin, in the north. It transports natural gas to Darwin, Alice Springs and regional centres, principally to fuel power generation as well as connects into the Northern Gas Pipeline (NGP) and exports to Queensland.","Status":"Online","Location":"NT","Ownership":"APA","Operator":"APA","First Gas Flow":"1986","Start Node":"Amadeus Gas Fields","End Node":"Darwin","Length (km)":"1658","Maximum Capacity (TJ per day)":"166 North\n50 South","Regulations":"Not Regulated","Compression":"Not available","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["APA"]},{"Name":"Bonaparte Gas Pipeline","Description":"The 287 kilometre Bonaparte Gas Pipeline (BGP) is a transmission pipeline that starts at Wadeye, transporting gas from the Blacktip gas field in the Timor Sea to the Amadeus Gas Pipeline at Ban Ban Springs. Gas from the BGP is also delivered via a small lateral to the remote power station near the town of Wadeye.","Status":"Online","Location":"NT","Ownership":"The APA Group 19.9 percent via Energy Infrastructure Investments\nMarubini 49.9 percent \nOsaka Gas 30.2 percent","Operator":"APA","First Gas Flow":"2008","Start Node":"Wadeye","End Node":"Amadeus Gas Pipeline at Ban Ban Springs","Length (km)":"287","Maximum Capacity (TJ per day)":"108","Regulations":"Not Regulated","Compression":"Not available","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["The APA Group 19.9 percent via Energy Infrastructure Investments","Marubini 49.9 percent","Osaka Gas 30.2 percent"]},{"Name":"Tanami Gas Pipeline","Description":"The Tanami Gas Pipeline is a 440km transmission pipeline in the Northern Territory that transports gas from the Amadeus basin to gas fired power stations at Granites and Dead Bullock Soak, which power the Tanami gold mine in the Tanami desert.","Status":"Online","Location":"NT","Ownership":"AGI Tanami Pty Ltd, AGIG","Operator":"AGI Tanami Pty Ltd, AGIG","First Gas Flow":"2019","Start Node":"Inlet from Amadeus","End Node":"Granites Meter Station and Dead Bullock Soak Meter Station","Length (km)":"441","Maximum Capacity (TJ per day)":"13","Regulations":"","Compression":"No compressor","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["AGI Tanami Pty Ltd, AGIG"]},{"Name":"Reedy Creek Wallumbilla Pipeline","Description":"The 48.5-kilometre bi-directional Reedy Creek Wallumbilla Pipeline (RCWP) is a transmission pipeline that links Reedy Creek and Wallumbilla.","Status":"Online","Location":"QLD","Ownership":"APA Group","Operator":"APA Group","First Gas Flow":"2018","Start Node":"Wallumbilla","End Node":"Reedy Creek","Length (km)":"49","Maximum Capacity (TJ per day)":"300 (Capacity North)                      520 (Capacity (Southern)","Regulations":"","Compression":"N/A","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]},{"Name":"Pakenham To Lang Lang Pipeline","Description":"A buried high-pressure natural gas pipeline that plays a vital role in helping to supply gas to Victorian households and businesses. BPP is a 35 km long, 250 mm diameter welded-steel wall pipeline. The BPP pipeline is buried at a minimum depth of 900 mm.","Status":"Online","Location":"VIC","Ownership":"Bass Gas Joint Venture","Operator":"Beach Energy","First Gas Flow":"2006","Start Node":"Lang Lang Gas Plant","End Node":"Dore Road Main Line Valve 9 Station","Length (km)":"35","Maximum Capacity (TJ per day)":"67","Regulations":"","Compression":"N/A","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Bass Gas Joint Venture"]},{"Name":"South East Pipeline System (“SEPS”)","Description":"The SEPS was constructed by the Pipeline Authority of South Australia (PASA - a Government owned utility) in 1990 to transport natural gas from the Katnook gas fields south of Penola to consumers near Penola, Tantanoola and Mount Gambier. Epic Energy acquired the pipeline from PASA in 1995. Following a gradual decline in the availability of gas from the Katnook gas field, the APA-owned South East South Australia (SESA) Pipeline was commissioned in 2005 to supply gas into the SEPS from the SEAGas pipeline. SESA is currently the only source of gas on to the SEPS.\nEpic Energy is owned by Q-Super.","Status":"Online","Location":"SA","Ownership":"Epic Energy South Australia","Operator":"Epic Energy South Australia","First Gas Flow":"1990","Start Node":"Katnook","End Node":"Snuggery","Length (km)":"83","Maximum Capacity (TJ per day)":"16","Regulations":"","Compression":"N/A","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Epic Energy South Australia"]},{"Name":"Gas Pipeline Victoria (“GPV”)","Description":"Carisbrook to Horsham with lateral to Ararat.","Status":"Online","Location":"VIC","Ownership":"Gas Pipeline Victoria part of Solstice Energy Holdings","Operator":"GPV and Tas Gas Networks (part of the Solstice Energy Group)","First Gas Flow":"1998","Start Node":"Carisbrook","End Node":"Horsham and Ararat","Length (km)":"182","Maximum Capacity (TJ per day)":"","Regulations":"","Compression":"N/A","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Gas Pipeline Victoria part of Solstice Energy Holdings"]},{"Name":"VicHub","Description":"VicHub is a transmission pipeline located at Longford Victoria that links the Declared Wholesale Gas Market (DWGM) and the Eastern Gas Pipeline (EGP). It provides  transportation for shippers who either receive gas at the Patricia Baleen Gas Plant (Orbost Receipt Point) and require access to the DWGM, or seek to store gas on the Eastern Gas Pipeline.","Status":"Online","Location":"VIC","Ownership":"Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)","Operator":"Jemena","First Gas Flow":"2003","Start Node":"Longford, DWGM Withdrawal","End Node":"Longford, DWGM Injection","Length (km)":"2","Maximum Capacity (TJ per day)":"150","Regulations":"","Compression":"N/A","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)"]},{"Name":"Colongra Lateral Pipeline","Description":"The Colongra Gas Transmission and Storage Pipeline was designed and built by Jemena to deliver gas to Snowy Hydro Limited's 667MW gas turbine facility near the existing Munmorah power station on the Central Coast of NSW. The pipeline also stores enough gas to allow the power station to run at full capacity for five hours.","Status":"Online","Location":"NSW","Ownership":"Jemena Ltd - owned by State Grid of China (60%) and Singapore Power International (40%)","Operator":"Jemena","First Gas Flow":"2009","Start Node":"Munmorah Compressor Station (Plumpton to Hexham Trunkline)","End Node":"Munmorah Delivery Station","Length (km)":"9","Maximum Capacity (TJ de":"Kurri Kurri","Length (km)":"20","Maximum Capacity (TJ per day)":"60","Regulations":"","Compression":"KKLP is equipped with its own compressors to boost system pressures, and can be used as a flexible supply source for the East Coast Gas Market.","Expansion Plans":"N/A","Source":"Data shown from 2026 GSOO","_companies":["APA Group"]}]},"Processing":{"headers":["Name","Description","Status","Location","Ownership","Operator","Basin","First Production","Type of Gas Processed","Capacity (TJ/day)","Gas Field Connections","Pipeline Connections","Expansions","Source"],"rows":[{"Name":"Wallumbilla Gas Plant","Description":"The Wallumbilla gas plant is located 13 km south of Wallumbilla and is connected via a dedicated (bi-directional) pipeline to the Silver Springs gas project. The plant is wholly-owned and operated by AGL. The plant’s primary function is to process gas for supply into the RBP and recover LPG. The plant’s operation is integrated with the Silver Springs gas project. The plant was off line for some time, during which it underwent modification and refurbishment. The plant was recommissioned and returned into service in 2015.","Status":"Online","Location":"QLD","Ownership":"100% owned by OGT Energy (Previously owned by AGL)","Operator":"OGT Energy","Basin":"Bowen","First Production":"1984","Type of Gas Processed":"Conventional Gas","Capacity (TJ/day)":"36","Gas Field Connections":"Silver Springs and Churchie and Waggamba","Pipeline Connections":"PPL4","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["owned by OGT Energy (Previously owned by AGL)"]},{"Name":"Orbost Gas Plant","Description":"The Orbost gas plant is located near Orbost on the north-east coast of Victoria. The facility was originally used to process gas from the now depleted Patricia-Baleen field. Once commissioned, the facility will process gas from Cooper Energy's Sole gas field for export to the EGP to meet demand on the eastern seaboard. Capacity is estimated to be 68 T operated by Esso a subsidiary of ExxonMobil. Initial production began in 1969 with a second gas plant being added in 1976 and a third in 1983. The current facility consists of three gas plants, gas conditioning plant and a crude stabilization plant, and is the onshore receiving point for oil and conventional gas from the offshore Gippsland Basin fields. Processed gas is used to meet contracts with wholesale gas customers, including retail suppliers, power generators, industrial and other users. Gas is supplied to TAS via the TGP, VIC via the LMP and NSW via the EGP. Current Longford capacity is approximately 1,175 TJ per day. The facility has a large capacity to handle the large volumes of gas produced by the GBJV as well as the peaking nature of the VIC market.","Status":"Online","Location":"VIC","Ownership":"Esso Australia (Exxon Mobil subsidiary) (50 percent), Woodside (50 percent)","Operator":"Esso Australia (ExxonMobil subsidiary)","Basin":"Gippsland / Barracouta, Kipper, Marlin, Snapper, Tuna/West Tuna, Turrum","First Production":"1969","Type of Gas Processed":"Conventional (gas condensate fields)","Capacity (TJ/day)":"720","Gas Field Connections":"Gippsland / Barracouta, Kipper, Marlin, Snapper, Tuna/West Tuna, Turrum","Pipeline Connections":"Victoria Declared Transmission System (DTS) - NGP; Eastern Gas Pipeline","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Esso Australia (Exxon Mobil subsidiary) (50 percent), Woodside (50 percent)"]},{"Name":"Lang Lang Gas Plant","Description":"The Lang Lang gas plant is located 70 km south of Melbourne in VIC.","Status":"Online","Location":"VIC","Ownership":"Beach Energy","Operator":"Beach Energy","Basin":"Bass Basin","First Production":"2006","Type of Gas Processed":"Conventional","Capacity (TJ/day)":"67","Gas Field Connections":"Yolla","Pipeline Connections":"Pakenham, South Gippsland","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Beach Energy"]},{"Name":"Kenya Gas Plant arious (Shell, CNOOC, MidOcean)","Operator":"Shell","Basin":"Surat","First Production":"March 2015","Type of Gas Processed":"Coal Seam Gas","Capacity (TJ/day)":"761","Gas Field Connections":"Not provided.","Pipeline Connections":"WGP","Expansions":"N/A","Source":"Data shown from 2026 GSOO","_companies":["Various (Shell, CNOOC, MidOcean)"]},{"Name":"Scotia Gas Plant","Description":"The Scotia gas facilities are located north of Miles in central QLD.  The facilities are owned by the Scotia equity participants and have been processing gas since 2002. Gas is sourced from the Scotia CSG field in the Bowen-Surat Basin before being compressed and dehydrated. Processed gas is currently exported via one of two routes: the APA connection or the Scotia - APLNG interconnect - which in turn provides a route to the southern and Brisbane markets or APLNG. \n\nFrom 2016 gas has also been exported via the gas transmission pipelines to the LNG facilities in Gladstone for liquefaction and sale into the international LNG market.\n\nThis capacity expansion is complete with 80 TJ/d gross compression capacity available at Scotia.","Status":"Online","Location":"QLD","Ownership":"Santos GLNG project (76%). Origin (24%)","Operator":"Santos Limited","Basin":"Bowen","First Production":"2002","Type of Gas Processed":"Coal Seam Gas","Capacity (TJ/day)":"110","Gas Field Connections":"Scotia CSG Field","Pipeline Connections":"APA and APLNG connections in Scotia","Expansions":"Expansions complete","Source":"Data shown from 2026 GSOO","_companies":["Santos GLNG project (76%). Origin (24%)"]},{"Name":"Moomba Gas Plant","Description":"The Moomba gas plant is located approximately 800 km north of Adelaide in SA. The plant is owned and operated by STO and produces gas, LPG, crude oil, condensate and ethane. The Moomba facility also houses 20MW of generation capacity and a reverse osmosis treatment plant for water. \n\nThe facility sources conventional and unconventional gas from over 100 fields in the Cooper-Eromanga basin and gas production from the facility. Gas sales to Adelaide commenced in 1969 (via the MAP), and to Sydney (via the MSP) in 1976. \n\nThe Moomba plant also incorporates gas storage facilities with the capability to store up to 70 PJ of sales gas with a maximum withdrawal capacity of 120 TJ/d.","Status":"Online","Location":"SA","Ownership":"Santos (66.6 percent), Beach (33.4 percent)","Operator":"Santos Limited","Basin":"Cooper Eromanga Basin","First Production":"1969","Type of Gas Processed":"Conventional and Unconventional","Capacity (TJ/day)":"290","Gas Field Connections":"SACB, SWQ JV, PE, PEL106B, SWJV (SACB), 3rd parties","Pipeline Connections":"MAP, MSP, SWQP and liquids export line to Port Bonython","Expansions":"There are no plans to expand Moomba Gas Plant processing capacity.","Source":"Data shown from 2026 GSOO","_companies":["Santos (66.6 percent), Beach (33.4 percent)"]},{"Name":"Fairview Gas Facilities","Description":"The Fairview gas facilities are located north of Roma in central QLD.  The facilities are owned by the Fairview equity participants and have been processing gas since 1997. Gas is sourced from the GLNG / APLNG owned Fairview CSG field in the Bowen-Surat Basin before being compressed and dehydrated. Processed gas is currently exported via one of two routes: the Fairview lateral of the QGP or the Comet Ridge to Wallumbilla Pipeline - which in turn provides a route to the southern and Brisbane markets. \n\nFrom 2015 gas has been exported via the gas transmission pipelines to the LNG facilities in Gladstone for liquefaction and sale into the international LNG market.\n\nThis capacity expansion is complete with 580 TJ/d gross compression capacity available at Fairview.","Status":"Online","Location":"QLD","Ownership":"Santos GLNG project (76%). Origin (24%)","Operator":"Santos","Basin":"Bowen","First Production":"1977","Type of Gas Processed":"Coal Seam Gas","Capacity (TJ/day)":"580","Gas Field Connections":"Fairview","Pipe
